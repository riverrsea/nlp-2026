experiment_name: textcnn_random
model_name: textcnn
embedding_type: random

data:
  train_file: outputs/data/train.csv
  val_file: outputs/data/val.csv
  test_file: outputs/data/test.csv
  max_len: 512

model:
  vocab_min_freq: 2
  max_vocab_size: 30000
  embedding_dim: 300
  num_filters: 128
  kernel_sizes: [3, 4, 5]
  dropout: 0.5
  freeze_embeddings: false
  num_classes: 10

train:
  batch_size: 32
  epochs: 10
  learning_rate: 0.001
  optimizer: adam
  loss: cross_entropy
  early_stop_patience: 3
  metric_for_best_model: macro_f1

eval:
  metrics:
    - accuracy
    - macro_precision
    - macro_recall
    - macro_f1

logging:
  level: INFO
